<!--=============== HP Bar ===============-->

<template id="tpl-hp-bar">
  <div class="hp-bar-inner">
    <div class="hp-bar-label">
      {% comment %} <span class="hp-bar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart-icon lucide-heart"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/></svg></span> {% endcomment %}
      <span class="hp-bar-title"></span>
      <span class="hp-bar-level" id="hp-bar-level">LVL 1</span>
    </div>
    <div class="hp-bar-track-wrap">
      <div class="hp-bar-track">
        <div class="hp-bar-fill" id="hp-bar-fill"></div>
      </div>
      <span class="hp-bar-value" id="hp-bar-value">100</span>
    </div>
    <div class="hp-bar-delta" id="hp-bar-delta"></div>
    <span class="hp-bar-score-display" id="hp-bar-score-display">Score: 0</span>
  </div>
</template>

<!--=============== Menu Button ===============-->

<template id="tpl-menu-btn">
  <span class="fx-options-item-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
         stroke-linejoin="round" style="display:block">
      <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
    </svg>
  </span>
  <span class="hp-mode-btn-label">Challenge Mode</span>
</template>

<!--=============== Defeat Banner ===============-->

<template id="tpl-defeat-banner">
  <div class="victory-banner-inner">
    <div class="victory-title hp-defeat-title">Defeat</div>
    <div class="victory-subtitle js-defeat-level"></div>
    <div class="victory-subtitle hp-defeat-hint">Let's try again?</div>
    <div class="hp-result-meta">
      <span class="hp-result-score js-defeat-score"></span>
    </div>
    <div class="victory-buttons">
      <button class="button-start-new-game hp-defeat-restart-btn">Try Again</button>
    </div>
  </div>
</template>

<!--=============== Victory Banner — level cleared ===============-->

<template id="tpl-victory-level">
  <div class="victory-banner-inner">
    <div class="victory-title">Victory!</div>
    <div class="victory-subtitle js-victory-attempts"></div>
    <div class="victory-hero-name js-victory-hero"></div>
    <div class="hp-result-meta">
      <span class="hp-result-badge js-victory-level"></span>
    </div>
    <div class="hp-result-meta hp-result-meta--score">
      <span class="hp-result-badge hp-result-badge--score js-victory-score"></span>
    </div>
    <div class="victory-buttons">
      <button class="button-start-new-game hp-next-level-btn">Next Level ></button>
      <button class="button-start-new-game button-share-result js-share-btn">Share</button>
    </div>
  </div>
</template>

<!--=============== Victory Banner — run complete ===============-->

<template id="tpl-victory-champion">
  <div class="victory-banner-inner">
    <div class="victory-title hp-run-complete-title">Champion!</div>
    <div class="victory-subtitle js-champion-levels"></div>
    <div class="victory-hero-name js-champion-hero"></div>
    <div class="hp-result-meta">
      <span class="hp-result-badge hp-result-badge--champion js-champion-score"></span>
    </div>
    <div class="victory-buttons">
      <button class="button-start-new-game hp-play-again-btn">Play Again</button>
      <button class="button-start-new-game button-share-result js-share-btn">Share</button>
    </div>
  </div>
</template>

<!--=============== Confirm Modal Body ===============-->

<template id="tpl-confirm-modal">
  <div class="fx-modal-settings" style="text-align:center">
    <div class="fx-modal-title js-confirm-title"></div>
    <p class="fx-reset-description js-confirm-desc"></p>
    <div class="fx-reset-buttons">
      <button class="fx-reset-cancel" id="hp-modal-cancel">Cancel</button>
      <button class="fx-reset-confirm" id="hp-modal-confirm" class="js-confirm-btn"></button>
    </div>
  </div>
</template>
